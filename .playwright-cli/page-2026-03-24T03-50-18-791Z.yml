      - paragraph [ref=e789]:
        - text: Data is collected by
        - link "Termless" [ref=e790] [cursor=pointer]:
          - /url: https://termless.dev
        - text: census probes — standardized test sequences sent to
        - strong [ref=e791]: headless terminal emulator libraries
        - text: ", not the terminal applications themselves. Each probe writes ANSI escape sequences and reads back the terminal state via the library's API."
      - generic [ref=e792]:
        - paragraph [ref=e793]: Headless ≠ Real Terminal
        - paragraph [ref=e794]:
          - text: These results test
          - strong [ref=e795]: library implementations
          - text: (e.g.,
          - code [ref=e796]: "@xterm/headless"
          - text: ", not xterm.js in VS Code). Some libraries don't expose all features through their headless API — for example,"
          - code [ref=e797]: "@xterm/headless"
          - text: doesn't report cursor visibility or underline variants, even though the full xterm.js renderer supports them. Scores reflect
          - strong [ref=e798]: API completeness
          - text: ", not the real terminal's capabilities."
        - paragraph [ref=e799]:
          - text: We're working on
          - link "app-level testing" [ref=e800] [cursor=pointer]:
            - /url: ./about
          - text: that probes real terminal applications (iTerm2, Terminal.app, Kitty, Ghostty, Warp) to capture what users actually see.
